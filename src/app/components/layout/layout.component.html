
<!-- ================= TOP NAVBAR ================= -->
<nav class="navbar navbar-dark px-3">
  <!-- Left section -->
  <div class="d-flex align-items-center">
    <button class="btn btn-outline-light me-3" (click)="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <span class="navbar-brand mb-0 h1 titleText">Angular ERP App</span>
  </div>

    <!-- Right section (Tooltip-style dropdown) -->
  <div class="dropdown ms-auto">
    <div
      class="d-flex align-items-center cursor-pointer"
      data-bs-toggle="dropdown"
      aria-expanded="false"
    >
      <span class="fs-5 text-white me-2">{{ user?.roleName }}</span>
      <i class="bi bi-person fs-4 text-white"></i>
    </div>

    <!-- Dropdown menu -->
    <ul class="dropdown-menu dropdown-menu-end shadow">
      <li class="dropdown-header text-center">
        {{ user?.fullName }}
      </li>

      <li>
        <a class="dropdown-item" routerLink="/profile">
          <i class="bi bi-person me-2"></i> Profile
        </a>
      </li>

      <li>
        <a class="dropdown-item" routerLink="/change-password">
          <i class="bi bi-key me-2"></i> Change Password
        </a>
      </li>

      <li><hr class="dropdown-divider"></li>

      <li>
        <a class="dropdown-item text-danger cursor-pointer" (click)="logout()">
          <i class="bi bi-box-arrow-right me-2"></i> Logout
        </a>
      </li>
    </ul>
  </div>
</nav>
