<div class="header-div">
    <span>Useres</span>
</div>
<br />
<table id="userTable" class="table table-striped table-hover table-bordered">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>User ID</th>
            <th>User Name</th>
            <th>Role ID</th>
            <th>Role Name</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of useres; let i = index">
        <td>{{i+1}}</td>
        <td>{{ user.userId}}</td>
        <td>{{ user.user_name}}</td>
        <td>{{ user.roleId}}</td>
        <td>{{ user.roleName}}</td>
        <td></td>
      </tr>
    </tbody>
</table>
